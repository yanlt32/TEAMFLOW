services:
  - type: web
    name: mindtrack-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: mindtrack-frontend
          property: host

  - type: web
    name: mindtrack-frontend
    runtime: static
    buildCommand: echo "No build step required"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /api/*
        destination: /api/*

  - type: pserv
    name: mindtrack-db
    runtime: postgres
    databaseName: mindtrack_prod
    user: mindtrack_user
    databaseUrl: mindtrack_db_url